services:
  mongo:
    image: mongo:8.2
    container_name: gfx-mongo
    restart: unless-stopped
    ports:
      - "37017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gameframex

  game:
    build:
      context: .
    image: gameframex/server.launcher:local
    container_name: gfx-game
    depends_on:
      mongo:
        condition: service_healthy
      social:
        condition: service_started
    command:
      - "--ServerType=Game"
      - "--ServerId=1001"
      - "--ServerInstanceId=1"
      - "--InnerHost=0.0.0.0"
      - "--InnerPort=29100"
      - "--OuterHost=0.0.0.0"
      - "--OuterPort=29100"
      - "--HttpPort=28080"
      - "--IsEnableHttp=true"
      - "--DataBaseUrl=mongodb://mongo:27017/?authSource=admin"
      - "--DataBaseName=gameframex"
    environment:
      services__social__tcp__0: "tcp://social:29400"
      services__social__http__0: "http://social:28081"
    ports:
      - "39100:29100"
      - "38080:28080"
    volumes:
      - "./running/game/logs:/app/data/logs"
    networks:
      - gameframex

  social:
    image: gameframex/server.launcher:local
    container_name: gfx-social
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - "--ServerType=Social"
      - "--ServerId=1002"
      - "--ServerInstanceId=2"
      - "--InnerHost=0.0.0.0"
      - "--InnerPort=29400"
      - "--OuterHost=0.0.0.0"
      - "--OuterPort=29400"
      - "--HttpPort=28081"
      - "--IsEnableHttp=true"
      - "--DataBaseUrl=mongodb://mongo:27017/?authSource=admin"
      - "--DataBaseName=gameframex"
    environment:
      services__game__tcp__0: "tcp://game:29100"
      services__game__http__0: "http://game:28080"
    ports:
      - "39400:29400"
      - "38081:28081"
    volumes:
      - "./running/social/logs:/app/data/logs"
    networks:
      - gameframex

networks:
  gameframex:
    driver: bridge
