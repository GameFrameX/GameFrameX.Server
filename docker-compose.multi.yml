name: gfx-multi

x-launcher-discovery-env: &launcher-discovery-env
  services__Social_2001__tcp__0: "tcp://social-1:29400"
  services__Social_2002__tcp__0: "tcp://social-2:29401"
  services__Social__tcp__0: "tcp://social-1:29400"
  services__Game_1001__tcp__0: "tcp://game-1:29100"
  services__Game_1002__tcp__0: "tcp://game-2:29101"
  services__Game_1003__tcp__0: "tcp://game-3:29102"
  services__Game_1004__tcp__0: "tcp://game-4:29103"
  services__Game_1005__tcp__0: "tcp://game-5:29104"
  services__Game_1006__tcp__0: "tcp://game-6:29105"
  services__Game_1007__tcp__0: "tcp://game-7:29106"
  services__Game_1008__tcp__0: "tcp://game-8:29107"
  services__Game_1009__tcp__0: "tcp://game-9:29108"
  services__Game_1010__tcp__0: "tcp://game-10:29109"
  services__Game__tcp__0: "tcp://game-1:29100"

services:
  mongo:
    image: mongo:8.2
    restart: unless-stopped
    ports:
      - "47017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok" ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - "./running-multi/mongo:/data/db"
    networks:
      - gameframex-multi

  social-1:
    build:
      context: .
    image: gameframex/server.launcher:local
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - "--ServerType=Social"
      - "--ServerId=5531"
      - "--ServerInstanceId=2001"
      - "--InnerHost=0.0.0.0"
      - "--InnerPort=29400"
      - "--OuterHost=0.0.0.0"
      - "--OuterPort=29400"
      - "--HttpPort=28081"
      - "--IsEnableHttp=true"
      - "--DataBaseUrl=mongodb://mongo:27017/?authSource=admin"
      - "--DataBaseName=gameframex_multi"
    environment:
      <<: *launcher-discovery-env
    ports:
      - "49400:29400"
      - "48081:28081"
    volumes:
      - "./running-multi/social-1/logs:/app/data/logs"
      - "./GameFrameX.Config/json:/app/Configs:ro"
    networks:
      - gameframex-multi

  social-2:
    image: gameframex/server.launcher:local
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - "--ServerType=Social"
      - "--ServerId=5532"
      - "--ServerInstanceId=2002"
      - "--InnerHost=0.0.0.0"
      - "--InnerPort=29401"
      - "--OuterHost=0.0.0.0"
      - "--OuterPort=29401"
      - "--HttpPort=28083"
      - "--IsEnableHttp=true"
      - "--DataBaseUrl=mongodb://mongo:27017/?authSource=admin"
      - "--DataBaseName=gameframex_multi"
    environment:
      <<: *launcher-discovery-env
    ports:
      - "49401:29401"
      - "48083:28083"
    volumes:
      - "./running-multi/social-2/logs:/app/data/logs"
      - "./GameFrameX.Config/json:/app/Configs:ro"
    networks:
      - gameframex-multi

  game-1:
    image: gameframex/server.launcher:local
    depends_on:
      mongo:
        condition: service_healthy
      social-1:
        condition: service_started
      social-2:
        condition: service_started
    command:
      - "--ServerType=Game"
      - "--ServerId=1001"
      - "--ServerInstanceId=1001"
      - "--InnerHost=0.0.0.0"
      - "--InnerPort=29100"
      - "--OuterHost=0.0.0.0"
      - "--OuterPort=29100"
      - "--HttpPort=28080"
